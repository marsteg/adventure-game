# Voice Configuration for Characters
# Maps character names to voice settings for each TTS provider
#
# For SpeechT5: Use speaker_id (0-7325 from CMU Arctic dataset)
#   Common options:
#     - 7306: Female, neutral
#     - 3575: Male, deeper
#     - 1088: Female, younger
#     - 5142: Male, older
#
# For XTTS: Use speaker_wav path for voice cloning, or text description
#   - speaker_wav: Path to 6-30 second reference audio
#   - description: Text description of voice (fallback)
#
# For Bark: Use voice_preset (100+ voices available)
#   - Format: v2/{language}_speaker_{number}
#   - Examples: v2/en_speaker_0 to v2/en_speaker_9
#   - Full list: https://suno-ai.notion.site/8b8e8749ed514b0cbf3f699013548683
#   - Common presets:
#       v2/en_speaker_0: Male, clear
#       v2/en_speaker_1: Female, warm
#       v2/en_speaker_2: Male, deep
#       v2/en_speaker_3: Female, professional
#       v2/en_speaker_4: Male, young
#       v2/en_speaker_5: Female, soft
#       v2/en_speaker_6: Female, neutral (default)
#       v2/en_speaker_7: Male, rough
#       v2/en_speaker_8: Female, energetic
#       v2/en_speaker_9: Male, authoritative
#
# For KugelAudio: Use voice preset
#   - Options: "default", "warm", "clear"

characters:
  librarian:
    description: "Mature female librarian, mysterious, slightly sarcastic tone"
    speecht5:
      speaker_id: 7306  # Neutral female
